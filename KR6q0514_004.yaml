body:
  text: 住北京翊教寺嗣法門人上睿等編康熙十六年丁巳秋巡撫部院張公方伯徐公遣使持書至雲杜潼泉山請師中興洪山三辭不免於十七年戊午二月八日入院至山門云施設間門庭難道諸方莫越於此踏開向上竅盡較新洪山一級地佛殿釋迦老子不説説説得甚顯迦葉師兄不聞聞聞得最親山僧信手拈一炷香佛法到者裏也要人伽藍殿正當今日全藉渠力有照有用有權有實公王殿至大至剛惟德是輔事存函蓋合理應箭鋒拄祖堂是你者一隊漢將錯就錯非你者一隊漢以訛傳訛據室勘過了打有理難伸別時再來堪作甚麼諸人到此立不得坐不得以手自指云若是者漢別處安置伊不得喝一喝當日巡撫張公方伯徐公雲南巡撫王公守憲吳公糧憲李公學憲蔣公暨府縣文武衆護法請升座拈香祝聖畢上首白槌云法筵龍象衆當觀第一義輪菴和尚出衆顧左右問云聖凡同聚賓主歷然當日三峰恁麼道靈巖恁麼道未審和尚今日作麼生道師云不惜眉毛許近前進云祗如黃鵠山還肯點頭也無師云知老弟在靈巖也曾脊背汗出進云若不同床睡焉知被底穿師云作者難瞞菴復顧左右云大衆要識先師賓主句西河師子吼分明便禮拜歸衆乃云大道離言如天普蓋真機密運似地普擎衆生日用不知諸聖所以問出德山臨濟探頭太過睦州雲門收身欲速山僧今日遇緣即住得令隨行建法幢立宗旨以佛祖為標準與佛祖為師以人天為梯航與人天作眼不解空中著彩何妨錦上鋪華歷歷孤明當陽顯示諸人幸是人人慷慨箇箇英靈寧迷顧鑒之端肯滯識情之內妙圓超悟正在此時遂喝一喝云誰敢錯誤絲毫上首復白槌云諦觀法王法法王法如是次日巡撫部院暨司道府縣文武諸大護法請開堂拈護法宰官紳襟請疏以我為隱乎是處是慈氏吾無隱乎爾無門無善財碧天明月下青嶂白雲來拈山門請疏賓主歷然當場展演沒量大人語默裏轉指法座云不自鐙王借來寶通殿裏本有平地休去未免鈍置諸人更上一層看有幾多光彩遂升拈香祝聖云此一瓣香爇向爐中端為祝延今上皇帝聖躬萬歲伏願金輪永御寶祚長隆德冠羲軒道齊堯舜又拈香云此一瓣香奉為闔省撫部司道文武現位護法宰官伏願膺簡在而陟巖廊則位鎮磐石副具瞻以居方面乃功濟維城處處暢發凡聖宗旨頭頭擴揚古佛家風末上拈香云此一瓣香必有説焉惟自肯耳記丙午佛誕先師退翁老和尚日午從東巖籃輿登洪山大雄寶殿禮佛周視感慨係之值年長老明若懷香率衆請升座會城內外隨喜者萬人晚然光明幢命允汾曰此處在汝中興今歲戊午允汾果來住此遂插香云爇此栴檀用酬遠記上首白槌云法筵龍象衆當觀第一義師云第一義諦觀即不無山僧有願不撒沙頂門具正眼底試出衆相見僧問今古洪山巨剎三楚名藍和尚中興將説何法師云滿眼滿耳僧云若不問過爭知端的師便打僧一喝師云譬如間斂衣就座乃云形問答立機境意句交馳主賓互換總是宗乘末邊事山僧今日也是知而故犯由為初機與諸人開方便門示真實相舉起拂子召衆云見麼祖師提不起處提來擊案云聞麼諸佛説不到處説出啓無為之化行不言之教高低普應前後無差譬如帝力不棄一民不謂不知而不容不謂知之而含育諸人若也迥絶見知頓超情量自然常光現前壁立千仞處生死流驪珠獨耀於滄海踞涅槃岸桂輪孤朗於碧天三界拘繫不得而常居三界利生萬類攝授無門而能為萬類作主有如是自在具如是威德且知恩報恩一句作麼生道萬里山河歸有道一人端拱賀無私復舉僧問投子如何是一大事因緣投子云刀司空與老僧開堂師云問不違時答亦中節若於理上會者僧謾投子不得於事上看投子已是話行仔細檢點將來猶涉理事未為圓通山僧則不然設有人問如何是一大事因緣但向道我不敢輕於汝等汝等皆當作佛者裏承當得下擔荷得行世出世恩一時報足上首復白槌云諦觀法王法法王法如是下座立兩序上堂舉一手云獨掌不浪鳴拍手云兩掌鳴摑摑隨時任卷任舒覿體何偏何正高路世表下視塵寰撮大地如陶家輪移剎海向眉縫裏如是則法社幸乎得人叢林自然增氣應緣化物起舞乘風於以興慈運悲於以解粘去縛於以入淨入染於以越聖超凡於以廣度衆生於以承事諸佛總在諸知識各就自己本分依而行之喝一喝云還信得及麼倒跨楊岐三腳驢黧奴白牯無驚異結制開爐漢口江善人汝達居士請上堂問答不録喝一喝云陳爛火種已見光輝大冶精金應無變色三世諸佛於此拈卻炙脂帽子六代祖師於此脫卻鶻臭布衫古今天下老和尚百匝千重聯芳續焰你禪和子十箇五雙江之南淮以北齊魯燕趙吳越閩廣總恁麼去不知踏破多少草鞋今朝因甚麼風吹到洪山門裏不肯自棄自謾稍有些子氣息洪山斷不把汝放薦席厚暖處安排使汝耽延歲月驀拈拄杖卓一卓云一錘便就未為性懆機先得地豈不慶快卓拄杖下座重新佛殿衆護法檀越請上堂選佛覺場為選佛所以重興大人境界遇大人始能顯赫契物契機如理如事洪山古剎三楚名藍奇引瀟湘秀連廬嶽巍峨廣殿多年已被塵封委宛長廊盡日惟憑風掃今者時節既至檀護斯臨土石為之發光草木亦當稽首頓使煙霞烜彩梵宮高峙層霄金碧流輝鴻業永垂勝壤山僧安能伸頌萬一遂喝一喝云古寺緣逢此日新聯翩錦繡露天真願將補袞調羹手撥轉如來正法輪復喝一喝下座佛殿上梁升座天清氣朗水闊山高好日多同巨梁升起祝一人無疆之壽開十方選佛之場法苑增輝禪宗不墜此皆我大中丞大方伯與闔省文武宰官護法不忘靈山付囑種智圓明勝心堅固之所致也是以一佛出世多佛讚揚一華敷時千華圍繞見聞歷歷主伴重重山僧忝居斯席不覺乘風起舞有一句子蓋地蓋天曷惜張口吐向人前遂震聲一喝云巍巍寶殿雄三楚赫赫成功永萬年竟陵死心吳道人一念胡道人設齋請上堂百千法門同歸方寸河沙妙德總在心源洪山九間佛殿七間僧堂行也任你行坐也任你坐東廊上上西廊下下人境虛間家風疏淡二六時中一切事上無你左遮右掩處亦無私衷與你説底禪道佛法諸仁在此高挂鉢囊直須是雪上不怕加霜放捨從前護惜取箇徹頭忽然風吹石裂冷灰豆爆便見缺齒老胡一場話墮度僧竟陵女弟子法名廣德請上堂師喚第一位沙彌近前來沙彌近前師云汝名甚麼云某甲師云過左邊立喚第二位沙彌近前來沙彌近前師云汝名甚麼云某甲師云過右邊立乃召衆沙彌沙彌齊舉首師云頭圓像天足方似地古貌崚層丈夫意氣佳作仁士尚志禮之用和為貴識取自己本名箇箇爭先及第洞庭無蓋鉢盂無底勿以小緣妨於大事遂喝一喝云山僧苦口更叮嚀不妨又是從頭起佛者心清淨是法者心光明是道者處處無礙淨光是良久云可知禮也佛誕日雲南巡撫王公請上堂師升座拈香畢就座高聲喚維那𠰚那云在復喚監寺𠰚寺云在師云今日是如來降誕之日灌沐金軀之時汝等各各眼親手辦東家杓柄長西家杓柄短一總謾你們不得更要山僧潑郎潑賴作麼雖然有大檀越慣於好日生歡定然慶時納祐炊香梵宇齋惠緇流釋迦老子已是滿面增光洪山野僧亦且隨列得益你諸人還識隨隨三昧麼欲知千古意豈惜一盆湯巡撫部院張大護法壽誕司道衆宰官修建延生道場請升座卓拄杖云古剎雲興至人嶽降方外乾坤獨露域中正體全彰大野風清當空日麗伐鼓聲鐘誦經禮懺一一眼所共見耳所共聞天之普覆地之普載日之普照月之普臨風之普吹雨之普潤森羅萬象明暗色空一切諸法無不是自己般若智光發現處治國齊家修身誠意經天下之大經立天下之大本無不是自己金剛妙心圓轉時行住坐臥語默動靜接物利生隨根授道何理不契何事不成何德不周何恩不報故經云如來者即諸法如義又云應無所住而生其心爾諸禪德異口同音誦到者裏山僧升座舉到者裏木上座從旁忍俊莫禁也要道一句子普應來機遂拈拄杖卓一下云了然一句該全藏壽量無邊福聚高端午上堂今朝五月五佛法同遍普江漢關龍舟震天槌畫鼓高樓縱笙歌繞岸盈士女水上卓紅旗艾人騎艾虎蝦蟆不出頭將謂衆生苦主中賓賓中主眼裏塵沙耳裏土喝一喝云爭先奪取錦標回孟八郎漢真莽鹵開爐張成之居士請上堂冬令當行落葉打窗粗裏細天寒水肅冷風吹帽正中偏齒牙敲磕處一字元無父母未生前三心莫得大家在者裏有甚別商量洪山爐冶新開抑不獲已要使諸人脊背汗出箇箇光揚宗眼若是躍冶之流不祥莫甚衆中有本色赤純底快就山僧好手卓拄杖下座竟陵吳晞齋老居士七十壽誕請上堂日月星辰繫於天而天不高江河淮濟注於海而海不溢草木叢林發於地而地不厚耳目手足見於身而身不大衆生雖迷無二心諸佛雖悟無二道明如杲日霓若太虛以之修身即以之齊家以之利己即以之導物以之報君親以之教子弟以之廣慧命以之敦福基言無展事玉轉珠回語不投機川流嶽峙頭頭非取捨處處弗張乖大衆洪山與麼播揚出我口入你耳躍然者多多益善畢竟躬行君子誰是其人良久云晞齋壽量方無極豎點庭前柏子頭度僧本寺新戒可解八佛菴新戒純心小塔寺新戒蒼湄請上堂身中有生老病死念上有生住異滅國上有成住壞空此十二種事亦能迷卻天下人亦能悟卻天下人亦能鈍置古今人亦能轉移古今人若是倚他門戶靠他牆空拳指上生實解底決不能獨脫無依翛然自得汝諸佛子既已割愛辭親出家學道光剃頭淨洗足終日拈香擇火不知真箇道場地靈步步雪山草病者仍舊病在膏肓僧寶人人滄海珠貧者依前貧徹骨髓直須奮決烈之志啓特達之懷向父母未生前眨上眉毛一眼覷透此十二種事只是一法一法亦無可得於無可得處瞥起繁興大用則鉢盂倒覆乾坤拄杖橫擔日月腳腳踏著實地口口吞盡虛空説外那有絲毫行不盡底行外那有少許説不盡底用心若此則何恩不報何德不圓遂震聲喝云依而行之所作已辦上堂一滴滴水一滴滴凍天寒人寒風動幡動內不住受想行識外不著聲香味觸入息不居陰界出息不涉衆緣不是心不是佛不是物是甚麼喝一喝云喚起窗全曙催歸日未西上堂蘇州人言在紹興人説動武昌人相唾這箇臉漢陽人廝罵我怕你大衆且道山僧是何處人開口便打鄉談畢竟是甚語話喝一喝云平生肝膽向人傾相見還如不相識授比丘戒竟陵死心吳道人一念胡道人設齋請上堂拈起拄杖云不離真際建一切剎南山起雲卓一下云不壞假名而談實相北山下雨點翻聖凡窠窟拔脫生死根株日星河嶽節義文章不語怪力亂神久絶意必固我孤峰頂上豎卓橫眠中心樹子無搖十字街頭帶水拖泥掣顛風骨全露才與麼便不與麼鉢盂當圓枕保解脫更別解脫袈裟裏草鞋有事則上令下從間行亦小出大遇過溪度嶺撥草只要蛇驚拄戶搘門打地自然賊走長長在手往往如斯得益人時且益人非關己事何關己遂喝一喝云諸比丘能持否爾衲僧休莽鹵傳法度迷情吾故來茲土復卓拄杖下座上堂日日日東上日日日西沒頭上是天腳下是地眼臨緑水背靠青山人人道我會也仔細看來十里大王相似忽若拽取占波共新羅關額南辰與北斗交參掀翻澥嶽求知己撥亂乾坤見太平又作麼生商量拈拄杖卓一下云明眼人難瞞上堂飯籮邊漆桶裏金不博金水不洗水諸仁在處參方佛祖如生冤家月裏走金烏可惜許迅速光陰還打得箇翻車筋斗到梵天去麼苟或放膽不來鉢盂鞋袋免勞攤出箬笠炊巾擲向一邊也無外遺世界也無內脫身心為無為益無益梯航九有津濟四生萬般此道一信前緣任運騰騰惺惺到老衆中若有難謾衲子衝前云某甲何人洪山拄杖子未免惡發不信自己好怪得他弟子曹思贊法名久依請上堂今朝臘月中已到大寒節江河有凍痕地皮多折裂陝府鐵牛不行心處路嘉州大象靡蹈聖凡轍物外無為僧蒙頭一布衲忘卻祖師禪有口真間煞旭口照高林爛爛黃金色開門看遠山忽至一檀越謂是久皈依禮拜勤請法行者即聲鐘拄杖忙拖拽欲將如意珠換卻止啼葉圍繞數百人知伊徹未徹頓時沒思量教我如何説拈拄杖卓一卓云消息春風近欲來糝花枯木重新活復卓一卓下座天臺淡大師至上堂問善來文殊赤心片片家貧難辦素食和尚將何款待師云煮茶山下水燒鼎洞中樵進云青芥除黃葉紅薑帶紫芽還充得頭供養麼師云不妨多處添些進云分明一樣窗前月才有梅花便不同師云倣佛山家風味在不煩裝點恰清華乃舉金陵寶志公令人傳語南嶽慧思禪師曰何不下山教化衆生目視雲漢作麼禪師曰三世諸佛被我一口吞盡更有甚衆生可教化師云是何言歟寶公眼裏有筋思大舌頭無骨一雙腳能上不能下一張口能吞不能吐爭似我植聖大師獅筋象骨鶴貌雲心嗒焉似忘其偶窅然莫測其涯上山也是伊下山也是伊吞盡也得伊吐出也得伊圓如明月珠寧留滯迹利似金剛劍難犯全鋒千峰頂上著足卻在十字街頭垂手十字街頭相見卻在千峰頂上説話今朝光賁洪山實情慶幸嫩草承趺坐長松響梵音昔年遊履處歷歷總記得山僧素承愛教敢忘提攜鄭州梨青州棗別地果實雲門餅趙州茶從上餿殘總總不成供養只得將鉢袋裏所藏一品聊呈漆器非大師知我鮮有不唾而擲之者遂抬手云囉邏招囉邏哩囉邏搖顧左右云且道是甚物事成家當日原無物知味今朝只有師便下座為徐太夫人本淨道人對靈小參拈拄杖云金剛寶劍截結使纏縛之憂卓一卓云般若智光破生死昏迷之暗修短夭壽出沒縱橫何去何來離名離相迥絶依倚放之自然苟能一念不落諸緣便可多方隨流認性鳥啼無關花落水緑詎礙山青密密綿綿惺惺歷歷既歸根以得旨宜就位而轉身且道即今孝子徐尊顯迎請山僧升座説法以資先慈本淨道人高超三界獨步大方覿面相親可曾見否遂喝一喝云撒手到家人不識九蓮開合自莊嚴竟陵吳太夫人死心覺道人七十壽誕請就湖亭升座靈機密運妙智無私一句當陽萬仞壁立迥超物表透出形聲高於天而生天厚於地而育地即衆生境界中作不思議事向塵勞窠窟裏放無畏寶光曖顧大衆云總是箇娘生面目三百六十骨節巍巍卓立八萬四千毛竅孔孔洞彰一日十二時一歲十二月陰陽寒暑語默動靜種種三昧皆吾心之常分非有假於他術也今朝東湖園庭有齋乃吳太夫人本覺道人七十誕辰飯僧營供特請山僧升座説法利益一切洪山口門闊大已如實説了現前諸仁復云何讚歎苟或讚歎不盡無量壽王如來從山僧舌本上湧出全身重伸其義汝等諦聽善思念之遂震聲一喝云百年三萬六千日日日日頭東畔出六根門頭常放光各各具有大威德復喝一喝下座中秋上堂舉馬祖西堂百丈南泉玩月次祖云正恁麼時如何堂云正好供養丈云正好修行泉拂袖便行祖云經入藏禪歸海惟有普願獨超物外師云此夜一輪滿清光何處無正恁麼時馬家父子看即有分其奈老簸箕不耐間情教人捏目引出者一隊弄光影漢説好供養掉棒打月説好修行水中撈月兩個既然漏逗一箇又更懡㦬拂袖便行猶存護惜道經入藏禪歸澥惟有普願獨超物外大似憐兒不覺醜洪山今日中秋門戶未致寥寂亦不要好供養亦不用好修行但搭得幾箇雲門糊餅烹得數碗趙州濃茶大底大圓小底小圓有功者罰無功者賞諸人拂袖便行總與本分草料打七上堂大事未明如喪考妣相罵饒你接嘴大事已明如喪考妣相唾饒你潑水拈卻鉢盂匙箸喫飯不得併卻咽喉脣吻出氣不得諸人也沒量罪過山僧也沒量罪過拄杖子也沒量罪過遂拈起拄杖云罪過深復何憑提來勝得豐城劍報盡人間兩不平下座上堂好諸和尚子千山雲靜遍野風清掃門葉下舊林堆對客泉飛深澗響箇箇抱荊山之壁人人懷滄海之珠斡旋佛祖樞機提掇衲僧巴鼻透頂透底亙古亙今即有為而顯無為借俗諦而見真諦不遺一物不立一塵咸承此箇威光特示大人境界乃鼓掌三下云自從舞得三臺後拍拍原來總是歌上堂供養百千諸佛不如供養一箇無心道人者樣説話直是好笑舉世間人眼睛鼻孔最親最近喜則滿面生光怒即雙眉陡豎開口未全拋舉意便知有好所好碓嘴生華惡所惡佛面百醜阿那箇是無心者驀指露拄云你是腳跟點地底近前來解開胸懷道一句看良久自摑口云幾令教壞人家男女比丘湛源薦親請上堂有情之本依智海以為源含識之流總法身而成體要識此源麼以拂子作流水勢云不離當處嘗湛然覓即知君不可見要識此體麼擊禪床云一擊忘所知更不假修持澄澄絶照凜凜孤危本生父母處處逢渠現前諸人莫不是爺娘養底未必鐵打心肝因甚全忘奉重山僧慈悲之故與你直截提撕遂拈拄杖卓一卓云為人子止於孝諸山師友見訪請上堂與麼來者風生百谷不與麼來者水肅千江與麼不與麼來者日照寒光淡不與麼與麼來者山搖翠色新拈拄杖卓一卓云者裏捱開線路便見自他一致賓主互融以白雲為蓋以流泉作琴松間石上不妨舉古論今水際山顛豈礙拋沙撒土會心處萬象開顏點頭時森羅起舞敢問諸仁畢竟其中事作麼生良久云謾説人情如太華人情難比道情高上堂拈拄杖卓一卓云心不是佛佛與心俱非又卓一卓云智不是道道與智俱遣山門外石幢子雨洗風吹青又黃猝然討他頭鼻不著祗如鉢盂口向天露拄腳踏地從來不曾轉變你道又成得甚麼邊事喝一喝
