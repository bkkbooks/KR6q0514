body:
  text: 住北京翊教寺嗣法門人上睿等編師順治丁酉十一月十七日在蘇州靈巖受請十二月二十二日到寺山門無門之門阿誰篆額看得分明君子可入佛殿太尊貴生自號滿覺三拜不施令人疑著伽藍用汝全心推我半面禮尚往來隨家豐儉祖堂東土西天一堂風冷接響承虛有人不肯據室拈拄杖云打開青嶂踞虎頭按下白雲收虎尾一掌一握一棒一條皮下有血底自不怪新長老手腳毒辣且道畢竟圖個甚麼卓一卓云不入虎穴爭得虎子拈當道請疏昔日靈山親付囑直須當道與人看紳衿疏一毫頭上文彩全彰有眼者見三千里外音響各別有耳共聞顧左右云此回不是夢真箇到廬山山門疏相隨來也言端語端山僧要放此話大行諸人切須記取這轉指法座云大寶華王座究竟如虛空作禮而陞忒煞難為作者因地而起還他本分宗師喝一喝云出頭天外看誰是我般人遂陞拈香祝聖罷又拈香云此一瓣香著甚來由特地驚群駭眾既然心不負人難免痛定思痛今朝落在手裏單為穿過靈巖山頭面無慚色這老和尚一雙鼻孔特與諸人出氣插入爐中便攬衣就座上首白槌云法筵龍象眾當觀第一義師云第一義諦放下槌來早已千里萬里捫空追響勞汝心神有不離當處直下取證底衲僧出來乘風起舞相席打令看僧問機先一著到者方知有一句子請師答話師云香谷林中風颯颯進云作家宗師再乞端的師云虎溪橋下水淙淙僧呈起坐具云這邊的又作麼生師打一棒云領過得也未問遠離鷲嶺來振濟宗雙峰峰頂上相見意如何師云臘月火燒山進云新乾明舊法令向上向下作麼提持師云龍蛇易辨進云信知佛種從緣起拈花始驗箇中人師云真箇那僧以坐具打一圓相師打云百雜碎問天寒日短滴水冰生如何是和尚家風師云徹骨徹髓進云客來將何款待師云兩人共一碗僧便禮拜師云來日更與一頓問如何是乾明境師云橫看成嶺側成峰進云如何是境中人師云不住孤峰頂常伴白雲閒進云未審人在境中境在人中師云你向甚處去來進云人境已蒙師指示祖意西來更若何師云五九盡日又逢春又一僧出師云且住三世諸佛橫說豎說徒逞詞鋒歷代祖師全提半提虛張意氣山僧今日打頭貴遇作家實情好與伊二十拄杖何以廣大門風威德自在權衡在手生殺臨機十地到此魂驚二乘聞之膽裂若也未有奔流度刃底眼目總不勞拈出跳脫一步地闊天寬便可十方剎土應緣而至百千三昧無作而成一切時煥古騰今一切處騎聲蓋色獨超象外迥絕羅籠譬如寶劍揮空空空絕跡驪珠鑑物物物流煇七穴八穿四通五達十成好箇沒量漢子更說甚千聖不攜萬機寢削隨喝一喝云無煩久立冀自知時上首復白槌云諦觀法王法法王法如是便下座當晚小參佛祖之道一切現成眾生日用不知遂致自生違背家中捨父衣裏忘珠馳逐天涯伶俜辛苦諸聖問出頭來千般言萬種喻只要時人知有果然知有總是碧眼胡僧黃面老子一齊教伊且向背後立地其餘七十三八十四當甚茄子瓠子在汝諸人面前又作得箇甚麼伎倆山僧道業荒疏才識短闍胸中實無絲毫見處齒縫亦不挂箇字腳願居學地豈欲稱師無端被人推出鼻地濫膺斯席大家相聚喫莖虀隨分有鹽兼有醋饑餐渴飲且恁過時江東西湖南北行腳高士挾複到來入門貴須辨主方見參學眼正若是佛法的的大意山僧未出靈巖早與諸人道過了也午間上堂是第二頭適才小參是第三首乾明方當入院之初肯教諸人落七落八只得倒行此令返流旋一去也隨顧侍者云收取拄杖子便起身歸方丈次日請兩序頭首上堂恁麼恁麼鶴鳴子和不恁麼不恁麼虎嘯風生恁麼中不恁麼昨日住持事繁不恁麼中卻恁麼今朝量才補職喝一喝云俊快底自肯承當本分底放他閒去堪作人天眼目便與祖佛為師琢玉烹金有權有實變生為熟無黨無偏符到奉行客來須看我若坐時你應立彼彼顯出身之機我開口時你即聞剎剎驚險崖之句髑髏常于世界鼻孔摩觸家風唱拍相隨一多無礙紀綱畢正賓主克諧直得白牯黧奴助揚佛化叢林草木現瑞放光且大功不賞一句作麼生道回而更相涉不爾依位住開爐上堂問爐韝洪開烹凡煆聖出格人來如何施設師云上座每日拈匙把箸甚有氣力進云掀倒禪床又作麼生師云打了拖聲勢進云看取令行時師便打僧一喝師云知汝不易問火種和煙得柴頭品字堆不與萬法為侶底還覺脊背汗出麼師云破皮厚三寸進云和尚慈悲何在師云靜處踝了打僧無語師云且去別時來乃云西江叢林剎竿相望或有栴檀叢林栴檀圍繞或有荊棘叢林荊棘圍繞或有荊棘叢林栴檀圍繞或有栴檀叢林荊棘圍繞火爐頭一千五百坐得骨臀生胝不見冷灰豆爆祗聽熱碗鳴聲乾明這裏斬新握方外鉗鎚乘時開作家爐韝無論栴檀荊棘一齊投入喝一喝云直得陝府鐵牛通身汗下嘉州大象滿面光生諸禪德當爐不避火迸眨上眉毛看是甚麼火色便下座上堂冰枯雪槁天寒人寒一有多種二無兩般少室鐵牛常甘水草黃梅石女子母團圓惟有物外閒人衲被蒙頭圍爐打坐得失是非一時放卻堪笑韶陽跛足師把得雲簫繚亂吹千古萬古和難齊拍手一下云即今還和得齊麼剛被風來吹別調知音知外更誰知除夜小參大盡三十日小盡二十九露柱掛燈籠僧堂佛殿後恁麼會得隨例餐鎚子未有衲僧氣息在乾明今夜不似北禪烹露地白牛大驚小怪但向紅爐上拾一點雪枯木上糝些子花與諸人赴箇時節遂於身上拈起布毛吹云短燭看隨殘臘盡春風轉入我門來歲旦上堂問深山裏佛法罕逢新年頭家風平展如何是和尚最初一句師云今朝正月旦進云斬新條令更請施行師云伏惟知事頭首起居萬福進云天雨四花盈寶座拈香祝聖慶昇平師云重說偈言問元正啟祚萬物咸新一句無私請師便道師云拄杖抽條丈二長進云果然恩大難酬師隨聲便喝僧罔措師云惱亂春風乃云化育之本物我同途生佛之元古今不易卓拄杖一下云山僧今日已是打開門戶了也乾坤大地日月星辰草木昆虫森羅萬象總在這裏𨁝跳山門頭合掌佛殿裏燒香揖釋迦拜彌勒禱祝咒願遞相慶賀直是有意氣時添意氣不風流處也風流復卓一下喝一喝云吾助汝喜上堂昨夜雪上更加霜今朝佛面增百醜文殊普賢行路難黧奴白牯卻知有寒山燒火滿頭灰拾得風前拈起帚良久顧眾云你這一隊漢冷冰冰地在這裏討甚麼碗古嶷和尚生忌上堂大善知識以無邊虛空為正體以香水海不可說塵剎為化境卷舒九有出沒四生是以去年七月一葉落天下秋今年正月一花開大地春其落也隨處釋迦其開也千身彌勒雖然猶是我古嶷師兄應緣化物時節若論本分提持坐斷死生不通凡聖諸人又向甚處相見攛下拄杖云直下來也上堂問但得雪消去自然春到來是否師云花須連夜發莫待曉風吹進云狼藉不少師云腳跟下掃來看僧一喝師云過猶不及乃云天地與我同根萬物與我一體爪生髮長筋轉胍搖露結為霜雲騰致雨那有些子違時失候諸人到這裏何不猛著精彩進前三步踏一踏則須彌起舞唾一唾則香海興波若更呆椿椿地坐定布袋裏老鴉雖活如死元宵上堂奇怪諸禪德然燈佛與月光童子在中庭裏相爭佛法甚鬧撞倒功德天把黑暗女髑髏一擊百雜碎過去正法明如來以平報不平椎鐘告四方直得清涼山裏萬菩薩有馬騎馬無馬步行一時走入鬧籃中獨有普賢願王端坐高樓呵呵大笑云你這一隊弄影漢面皮厚多少現前諸仁盡是傍觀者且道有恁麼事無恁麼事驀顧眾云明眼人難瞞上堂問久雨不晴山門頭金剛渾身濕透父母未生面目為甚針劄不入師云一年春過一年春進云覓火和煙得擔泉帶月歸是神通妙用是法爾如然師云牆壁有耳問雲橫大野水滿清溪略彴不是趙州橋未審行人如何得過師云拽脫鼻孔進云畢竟借誰之力師云你眼在甚麼處僧作禮云和尚三寸甚密師便打僧云須到如此師云天地懸殊乃云釋迦掩室於摩竭推門落臼淨名杜口於毘耶咬定牙關須菩提唱無說而顯道莫謗如來正法輪天帝釋絕視聽而雨花未必心頭事悄然乾明慈悲之故有落草之談前廊下與你說後架上與你說這裏聲鐘伐鼓豎拂拈椎也與你說那裏開單展缽運水搬柴也與你說你更不會卻近前就我覓我劈脊與你一棒有一棒到你彩鳳舞丹霄無一棒到你鐵蛇橫古路擬看腳下多少人喪身失命若是箇不受人處分底點著便轉撩起便行南北東西如雲似鶴山河大地有甚麼過上堂問山青水綠打開金剛眼睛日上月下捩轉衲僧巴鼻學人今日要與和尚作境話會師云桃花杏花鬥開進云還有指點處也無師云柳條桑條憋破進云果然車不橫推理無曲斷師豎起拄杖云幾人信得他及進云虎溪橋下月光接漢王峰師便打僧一喝師云詐明頭乃云見色明心心不是佛聞聲悟道道不屬知不屬不知景物欣榮山川晴媚桃花一樹兩樹紅自紅脩竹三叢四叢綠自綠喚作色得麼鴉鳴鴉鴉鵲噪鵲鵲郭公鳴郭公姑惡鳴姑惡喚作聲得麼山僧明明向你道尚自不會何況蓋覆將來兄弟日月易流應是從前肯重處盡情颺卻大用現前不存軌則盡十方世界有甚麼物與你為緣為礙如只倚他門戶傍他牆東覷西覷明聽暗聽得些小知小解其實半瞽半聾他時後日也要開這兩片皮向聲前色後鼓弄人家男女莫言無事好上堂問千林聳翠萬嶽攢奇向上一機請師別轉師云蔥嶺那邊有進云為甚麼這邊無師云日頭出來看進云九萬里鵬斯展翼百千年鶴便翱翔師云不必問有一人常在歡喜中不受讚歎有一人常在冤苦中偏愛謗毀只此二人那箇為親師云賞不避仇讎進云快人一言師云尋思去僧便歸眾師云眼不見鼻孔問日日是好日時時是好時大通智勝佛十劫坐道場為甚麼佛法不現前師云略無些子衲僧氣息進云鈍置殺人師云有甚饆饠䭔子快下將來僧擬議師便打僧云莫教屈著師又打云總是山僧罪過乃云眼睫橫亙十方眉毛上透乾坤下透黃泉諸人未得箇入頭須得箇入頭既得箇入頭須得箇出頭祗如到江吳地盡作麼生去隔岸越山多向那裏住有人道得轉身句不著還草鞋錢上堂世尊三昧迦葉不知迦葉三昧阿難不知阿難三昧商那和脩不知商那和脩三昧優波麴多不知恁般說話顢頇佛性儱侗真如且作箇模子搭卻諸人晨朝熱水洗面夜間脫襪打眠食辦擊鼓眾集撞鐘燒香掃地合掌搖頭菜園牆倒晴方築房舍籬穿雨過脩東廊上上西廊下下並不曾差了一步錯了一事因甚不知有分緇素識好惡底衲僧及早解開胸懷笑一聲子惺惺直言惺惺歷歷直言歷歷乾明自知你不是箇謾人自謾漢上堂好雨知時節春無三日晴溈山五百頭真箇可憐生溪東溪西一任橫拖倒拽且道這片田地始終屬阿誰一僧出云和尚豈得問別人師下禪床把住云道道僧擬議師便掌云感你不徹上堂滴水滴凍道一句善言言者言所不能言崖崩石裂示一機善跡跡者跡所不能跡諸人終日區區有口只是喫飯乾明冷地相為不妨好手彰名遂拈拄杖卓一下云已是徹困向汝也上堂拈拄杖云丁一卓二有手腳放兩拋三無背面明眼人看不見看得見山僧實落分付與你卓一卓云切忌謾承當佛涅槃日上堂僧問宴寂熙連河側金棺特示雙趺正恁麼時莫便是佛否師云夜半須彌安鼻孔僧云賴遇和尚證明師云疑殺天下人乃云二月十五日以前有佛處不得住二月十五日以後無佛處急走過正當二月十五日黃面瞿曇做盡腸肚猶自死不甘心以手摩胸告眾曰汝等善觀吾紫磨金色之身瞻仰取足勿令後悔大似靈龜曳尾拂跡跡生諸仁二千餘年後誦伊之言服伊之服行伊之行一箇箇眼光爍破四天下且道釋迦老子即今甚處去也拍禪床一下云時人只看絲綸上不見蘆花對蓼紅上堂夫學般若菩薩直須諦當去始得千里萬里至此行立總在人前賓則始終賓主則始終主賓無二賓主無二主擬議思量即沒交涉顧左右云要會乾明賓主句麼鶴冷移巢還避月龍寒出洞早生雲大士誕日覺心道人請上堂僧問淺綠深紅莫非文殊妙境啼鶯語燕盡是觀音普門未審寶華座上是第幾應身師云山僧常念觀音僧云百千手眼利濟無邊因甚麼高麗不去師云觀音觀音僧云翠柳拂開金世界紅蓮湧出玉樓臺師云不勞讚歎乃云惟一堅密身一切塵中現豎起拂子云觀世音菩薩來也即今在山僧拂子頭上揭示圓通妙門以不思議無作妙德成就一切眾願上合十方諸佛本妙覺心與佛如來同一慈力下合十方六道眾生與諸眾生同一悲仰令諸眾生不涉情解意想頓獲十四無畏汝等諸人有智若聞則能信受遂擊拂子一下便喝一喝云非唯觀世音我亦從中證上堂久雨熟梅天柴生滿灶煙林間泥滑滑時叫屋頭邊銅䤬鑼裏滿盛油底途中善為不遺一滴何處見他滲漏來是你問凡答凡問聖答聖為甚隨他舌頭轉良久云腳下泥深上堂諸仁在此饑餐渴飲閒坐困眠一箇渾身若無事事與汝驪龍明月珠卻道分文不直與汝蜣螂糞彈子卻道價重千金是顛倒情深是轉移力重於此分疏得下足表智眼洞明若只儱侗顢頇切忌口銜羊角走區區不是好生涯上堂三周寒暑遠泛重溟十萬里西來直上梁王殿雖是小過令人大怒何故不合欺我唐土人山僧與麼說話是肯老胡不肯老胡若道肯易掩當門齒難藏蓋膽毛若道不肯達磨一宗掃土而盡諸人到這裏作麼生為祖師出氣良久云還我骨髓來上堂僧問道也者不可須臾離也可離非道也如何是不離底道師云碓搗東南僧云無聲無臭又作麼生領師云磨磨西北乃云一徑直二周遮衲僧會得萬別千差是你諸人認著門前屋後便乃叉手當胸這邊稱楊那裏稱鄭進一步即迷其理退一步又失其事殊不知平田莊裏草色青隨杖險峻岩頭藍光碧照衣何處客來閒共語免教望斷夕陽西精進七內上堂僧問百年三萬六千日返覆元來是者漢請和尚驗過師云胡地冬抽筍僧云現前大眾沾恩有分師云得到口也未僧一喝師便打又僧問有物先天地無形本寂寥能為萬象主不逐四時凋如何是萬象主師云山高路遠到這裏甚不容易僧云等閒模著虛空鼻生死猶如戲一場師打一棒云免怪空疏乃云去卻一拈得七上下四維無等匹逼得鯰魚上竹竿俊鶻迅鷹趁弗及諸人未得箇入處但向己求有箇入處莫就他覓絕羅籠脫羈勒不風流處也風流大抵還他好丰骨這邊與那邊許汝放膽說喝一喝解制上堂今朝正月十五雪霽雲收天宇叢林制解放行究竟無法可取山僧起倒因人歡喜無過直與各攜杖笠出松門萬里溪山誰共語驀拈拄杖卓一下云咦春風漸見花狼籍珍重還須帶眼看上堂行腳衲僧也須識取去底識取住底如何是去底離家舍不在途中者是如何是住底在途中不離家舍者是說甚你有則與你無則奪直饒說得去住分明三千里外猶被拄杖子穿卻鼻孔靠拄杖下座上堂劫外靈機悟心者始顯聲前活路達道者能行雲在嶺頭乍舒乍卷水流澗底可淺可深花開葉落豈是榮枯春去秋來原非遷變復生居士二十五年前與山僧欣逢白鶴古寺早已聞斯道矣今秋七月廿六正值從心之辰特到山中齋我一眾山僧更說箇甚麼以資綿遠良久朗吟曰佛法人情不用分抬頭撞著自家底火棗冰梨信手拈子子孫孫皆可喜便下座
