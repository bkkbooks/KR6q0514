body:
  text: 住北京翊教寺嗣法門人上睿等編上堂拈拄杖云我説法要譬彼天澤卓一卓云點點不落別處諸仁若也根本端正何須更論得失拈香底只管拈香揖客底只管揖客維那院主豎透金圈直歲典客橫吞栗棘監修司庫行者人力齒鏃破關斬釘截鐵立處常教眼似眉鼻孔還伊高突兀喝一喝云共振祖佛家聲何待他時異日死心一念二道人至山請上堂僧問虛空落地也安放某甲向甚處則得師云潼泉許多山水也不惡僧云更不恁麼幾成埋沒師打云切忌從前被眼謾尼問高廣座上緇素同瞻請和尚劈開面門放出先師形相師云分明垂手處不礙衆人看尼佇思師便打乃拈起拄杖云甚生標格獨存真文理條然日見新直截根源少枝葉打開胸臆任施陳卓一下云一句當機普天齊應把住也則檻前山深水寒風規凜凜放行也則天際日上月下意氣融融大地山河搖撼不動森羅萬象指點分明這邊那邊用來成現全提半提舉起便知箇箇出頭天外抑他誰是旁觀良久云汝等真正要與齊肩并躅者麼復卓拄杖一下云一念不生休合伴死心無法可傳持登山到頂憑誰力腳下何曾別有師荷湖悟心闍黎七十請上堂天機圓活黃河三千年一清正眼洞明蟠桃五百年一熟平田淺草峭巍巍帶水拖泥淨裸裸千差靡間一味尋常在己在人頭頭今時樞要涉事涉理法法上古風規日用自來現成年深何有變易分明真實箇漢端的無量壽王山僧與麼稱道也只是因齋慶讚拄杖子相席打令雖然不以戒臘推無妨多處添些子遂拈拄杖卓一下云替他説不盡師到沱潛荷湖度生菴佛誕日野潛知藏率本處紳襟檀越居士等請升座僧問釋迦出世獨自稱尊和尚升堂人天景仰是好日多同是今古一致師云彼彼住山人不曾較長短僧云海衆臨筵得何利益師云地靈步步雪山草僧寶人人滄海珠僧一喝師便打又僧問莫高匪天天不能蓋莫厚匪地地不能載獨尊之旨果何如耶師云甜漿苦汁重新澡惡水香湯一例澆僧一喝師打云替人喚棒豈是男兒僧無語歸衆師云更不叫皇天誰人能似你乃就座連喝兩喝云道遠乎哉觸事而真聖遠乎哉體之即神麻三斤乾矢橛杖林山下竹筋鞭踏著稱槌硬似鐵僧堂中佛殿裏大者如兄小者如弟長底長法身短底短法身浩浩商量那處不是爾諸仁從朝至暮築著磕著知道錯過多少山僧今日應時及節要與盡大地人同入普光明殿不費纖毫氣力與黃面老子同坐同行同起同倒諸人切不可自生退屈好麼良久驀拈拄杖卓一下云樓閣門開春畫永大家齊唱太平歡徑山老和尚訃至上堂在今天下具大眼目真善知識無如我徑山法叔老師者允汾昔年行腳首於靈隱覺場得親爐韝深受鉗鎚茲忽訃聞化緣已畢於廣陵道示般涅槃四衆失所依歸百萬松杉雙徑杳諸山罕聞繼美三千樓閣五峰寒遂失聲作哀云和尚和尚詎不念此正宗淡泊異道崢嶸識海濤翻見河雲湧群迷未度孰能濟之小姪飲泣捶膺苦辭難吐心香一瓣聊以酬恩惟冀乘大願輪分身遍應庶不失少室祖花凋瘁三峰靈葉摧殘慰我鑒茲款款元日上堂喝一喝云春風蕩蕩物欣榮佳氣人人滿面迎看取千花生碓嘴太平端不在麒麟付楚林睿首座上堂拈起拄杖云拈一機則機機透脫卓一下云垂一句則句句流通麗萬象於當陽耀天光彩融千差於一智擲地金聲越祖超師順物齊己正恁麼時事存函蓋理應箭鋒祗合與汝平展不合與世商量且阿那箇解身裏出門遂擲下云分付今朝首座睿竟陵尹何方郭茂行二文學請上堂山僧自小不曾入學堂至年十七頓捨世間深重恩愛出家到今三十年矣鉢盂當枕頭袈裟裹草鞋天下名山不忘先迹腳何似驢腳隨雲舒卷接引後機手何似佛手撞著道伴交肩過容易那肯説生緣現前諸兄弟誰不是爺娘養底且道山僧生緣畢竟是甚處驀卓拄杖云有讀書人來報值監寺量侍者為衆黃安丐米歸請上堂問答畢乃曰拄杖頭擊節扣關逢人則出草鞋跟千山萬水到即不點誰家灶裏火無煙下載清風香滿路喝一喝云東巖今日大普請廚庫奔忙出門鬧彩檀越信施船來陸來豐儉隨家大非容易是汝諸人福利門中不得不作一字兩頭垂尖斗量不盡大堤江口平湖門外輕重多寡任力而行祗如前三三與後三三且道那箇合受人天供養祚西堂楫副寺會典客為衆化柴歸請上堂白蘋之洲芳草之岸明月蘆花不作境看副寺太無厭生西堂慣得其便東家六六成堆西家九九足算知客兩片脣皮動説多多益善一搕總收來主賓誰落賺爾禪流莫須亂人搬柴一束兩束柴搬人三轉五轉齊放下真堪羡且道羡箇甚麼且喜一冬燒不盡寒山那管滿頭灰臘八上堂東巖長笑老釋迦成道當初指臘八雪山深處枉用心一睹明星眼皮熱智慧德相碗脫丘妄想執著沒交涉無端開口歎奇哉敢對衆生漫饒舌今古同此乾坤古今同此日月箇箇不曾眼花誰來踏你覆轍喝一喝下座師五十誕辰觀察婁公則山居士孔月恆太翁胡內寧暨雲杜竟陵沱潛南嘉齊安遠邇護法紳襟緇素弟子等普設大齋請上堂拈香畢斂衣就座云㘞只者條通天活路千聖共行萬靈同轍乃古乃今無彼無此山僧自出母胎密之三寸不曾容易與人道破今朝承諸護法宰官居士遠邇緇素以茲辰是山僧五十初度逼上曲彔木床要盡娘生氣力重説一轉㘞不是心不是佛不是物上大人可知禮四十九年過五十今朝始因一事長一智明明百草頭明明祖師意遂拈拄杖卓一下喝一喝云一華開綻劫前春千葉芬芳熏大地興化長老睿楚林歸覲請上堂驀拈拄杖卓一卓云西天四七東土二三古今天下老和尚無不以此頂𩕳上一著流通正法眼藏顯示涅槃妙心捏聚放開總由者裏掉臂因行乘風起舞勘盡差別門戶不落玄妙機關獨步大方善能轉智處處超情越見頭頭接物利生八面玲瓏通身綿密若是恁麼事須歸恁麼人恁麼人既歸恁麼事必委復卓拄杖一下云快意相將振祖風道無偏隱日當中操持臨濟金剛劍倜儻楊岐栗棘蓬天臺淡然和尚八十誕日觀察婁公就修靜寺設齋稱壽請升座天臺古佛八旬誕辰鏡湖文星設齋榮祝群賢畢至海衆齊臨瑞藹祥雲堆堆疊疊奇特殊勝甚非小緣多因法苑成知己曾記靈山一會來故有此以佛祖為標準而佛祖尊師之老宿即有此以聖賢歸自己與聖賢作主之宰官驀拶相逢天然意氣一以堅心智力一以無礙辨才夫子鼻孔達磨眼睛展拓縱橫遊刃磅礡提持前佛慧命揭示後聖紀綱若杲日麗乎中天無不被其光照東巖今日極無邊虛空為口攝無際江海為舌稱揚莫及讚歎何窮直將須彌山作管筆信手拈來向太虛空中捷書箇壽字直得萬象森羅一時起舞遂震聲喝云快看文彩全彰處寶掌千齡運獨新師至漢陽水洪口弟子曹烍法名久問預為女弟子李氏法名久信五十初度請就雙嶽菴升座僧問法不孤起遇緣即宗江東西湖南北有一句子請和尚舉師云滾滾長江流不盡僧云鐵眼銅睛難覷破師云陰陰夏木囀黃鸝僧進語稍遲師打云欠少你甚麼僧禮拜歸衆師拈拄杖卓一卓云無量壽王如來有大陀羅尼門流出一切清淨妙法是法平等非思量分別之所能解現前諸人果能見色不為色牽聞聲不隨聲走自然古岸風生澄波月現凡聖賢愚道非物外陶漁耕稼人在境中存諸內而寬若太虛發乎用而明如杲日亙古如今長年不變暑退涼初秋香滿院壽筵同慶贈與伽陀復卓一卓云霞觴奚借彩輿斟經案茶鐺歲月深不出戶庭參佛祖中中流入是茲心孝子孔興禧薦嚴請上堂真性圓常正體凝寂曾無變易匪可相求喝一喝云果能向者裏透脫得去截生死之根株離聖凡之窠臼千差坐斷了了常知八面通途明明不昧萬象以不見而見諸法以不聞而聞不見見而見見無向背不聞聞而聞聞無起滅塵塵剎剎是箇大解脫門出沒縱橫往復無間且道即今孝子孔興禧所薦先嚴亨衢先生圓機妙應更於何處顯露九品蓮中成勝果十方世界現全身師到江州普澗菴佛誕日弟子文行遠徵遠為母祝壽請升座僧問香煙匼匝花雨繽紛是慶讚因齋是獨尊現瑞師云開五百桃熟三千進云一條拄杖扶雙曜萬里清風匝地生師云已在言前又僧問須彌喝彩寶掌呈祥正坐當堂冀垂指示師示古錦寫回文進云而今拈卻風幡句請師別展透時機師云一字不著畫乃云千華現瑞亙古同春不涉諸緣全彰正體識情莫到處祖佛於此出生受用無窮時聖賢以之成立包含萬有衣被群靈略露風規則珠回玉轉放一線道而錦上花鋪法法自融通頭頭非取捨然後兒孫得力室內間間主伴和諧眉前秩秩聲閬婢使是慈悲等心菩薩奴呼為施忍中事四思不報衆德皆圓驀拈拄杖召衆云看看山僧拄杖子固是與威音那畔更那畔善來齊庚今朝四月初八好日多同到這裏也合著指地指天底為伊因齋慶讚去也卓一卓云證取金剛無量壽彩霞嘗蔭抱苓松弟子馬相宇胡新之請上堂德山入門便棒一人傳虛臨濟入門便喝萬人傳實大丈夫漢一等是踏破草鞋舉步超東勝神州退身入西瞿耶尼回首望北鬱單越捻拳觸南閻浮提肯在他人手裏著口裏轉便恁麼去直是上曠人稀數片白雲籠古寺一條緑水繞青山不嫌家風冷淡還來此處向火俞昭允汾禪師住景陵紫芝菴語録住北京翊教寺嗣法門人上睿等編華嚴道場開啓本菴功德主周範肅同監院伊潭請上堂拈香白椎竟師乃云大統綱宗迢然正句巍巍獨運蕩蕩無私日月未足喻其明虛空詎能量其廣一大藏教廣詮密注盡扯爛葛藤古今佛祖半舉全提總弄間家具諸仁並肩挨足簇簇向前氣宇昂霄腳跟點地便好一一從自己胸襟流出與我蓋天蓋地去豈肯有口只堪喫飯就中要妙轉處孤危不立一塵不捨一法到者裏即委靈山奧旨非可泥言沉默少室真印何關杜見絶聞鬧市裏耳竅洞開百草頭眉毛榮起理隨事變事得理融物物新機塵塵活路同遊華藏性海共入毗盧道場潼泉自是故説即無説知而無知拄杖子亦不是無知而説無知故無説即説適逢華嚴之勝會快睹紫芝之重興放一線道與衆露箇音響遂拈拄杖卓一下喝一喝云但知開口易不覺舌頭長穆峰徐居士法名道章三十初度請就家庭升座問及盡知也三世諸佛口挂壁上祗如有意氣時增意氣不風流處也風流底還許伊開口麼師云到他家裏與他説家裏話進云漠漠水田飛白鷺陰陰夏木囀黃鸝作境會得否師云謾人眼不得進云因齋慶讚請師更道師云蓂開五百桃熟三千問東湖水滿良苗蔚然畢竟承誰之力師云你每日喫飯穿衣不在空裏進云實為恩大難酬師打云將謂吾辜負汝乃云群賢畢集長老升堂鼓罷香焚因齋慶讚既承道誼殷殷豈應袖手默默只得借釋迦老子手中一枝與伊重鋪錦上遂舉起拂子召衆云大衆見麼擊一擊云聞麼聞見分明是箇甚麼果能於此一立一切立一成一切成虎嘯龍吟珠回玉轉遍界無纖毫過患觸處悉自己光明日照天臨雲騰雨致甚生標格越樣風流如是則可與山僧拄杖子齊肩並躅頭頭響順聲和處處形端影直業大名崇福圓壽永且拄杖子更有過人處也無拈拄杖縱橫作舞云長長提不盡學佛乃知儒鄉紳胡勉齋護法請上堂問伐鼓聲鐘人天普集臨濟面門出入底為食來耶為法來耶師云這僧見怪進云爭奈旁觀者親師云是甚麼乾矢橛僧一喝師不顧僧罔措師便喝問處處緑楊堪繫馬去即印住家家門首透長安住即印一切總由和尚舊時車子要請橫推師垂左足示之進云大人境界果爾不同師垂右足示之進云要津把斷不漏絲毫露柱藏竄無地燈籠窺覷無門選佛場中還許伊縱橫得路否師打云放過則不可進云煩惱海中為雨露無明山上起雲雷師云三千里外絶淆訛問好雨知時點點不落別處乾曝曝底和尚還有麼師云那裏掠這虛頭來進云一人有慶兆民賴之師打云知恩者能有幾箇乃云道不囿方隨方化行理無礙事因事顯用以拄杖向前一劃云大衆隨山僧拄杖看有世界以莊嚴為佛事有世界以光明為佛事有世界以香飯為佛事有世界以音聲為佛事紫芝者裏譬如閟終日喫飯弗曾嚼著一粒米終日穿衣未嘗挂上一縷絲十二時中不依倚一物且以何為佛事堪忍界中當以無諍為佛事諸佛以無諍成一切種智具正遍知菩薩以無諍獲無生忍行諸波羅蜜辟支獨覺以無諍出無佛世現神通光明聲聞羅漢以無諍得八解脫不受後有天人以無諍增長十善修羅以無諍除其憍慢一切世人以無諍清淨三業永延慧命四大調適諸根猛利乃至八難三途四生九類草木昆蟲情與無情各各以無諍啓解脫門獲菩提道隨順覺性受用無極所以道不與一法作對便是無諍三昧多三昧中此三昧最勝現前諸仁一一眉橫鼻直眼裏有睛耳中有竅拜言紅日影緩緩到窗紗那須翻轉面皮但請一時證取喝一喝下座鄉紳吳晞齋法護請上堂問古者道遇人即鼻孔撩天未審遇箇甚麼人師云釋迦不在先彌勒不居後進云和尚誠言師云躡足進前須急急執鞭當鞅莫遲遲乃云田地穩密底抬腳不起神通殊勝底放腳不下天無門地無戶鉢盂鐼子多是囫圇吞卻拈一放一這邊那邊膠盆子相似驀卓拄杖一下云山僧久慣管他間事與諸兄弟淨潔打疊了是句亦鏟非句亦鏟直下峭絶通上險峻不須於一毫端現寶王剎坐微塵裏轉大法輪信手揭開釋迦老子青蓮華眼徐步踏斷達磨大師生鐵脊梁有如是自在具如是威德且道畢竟是何三昧靠拄杖休去復舉龐居士問馬大師不昧本來人請師高著眼大師直下覷士曰一種沒弦琴惟師彈得妙大師直上覷士禮拜大師歸方丈士隨後曰適來弄巧成拙師云龐家老子好箇本來人無端走向明白路上遭他馬大師上覷下覷回避稍難若非別轉宮商幾至膠拄鼓瑟馬大師亦自知探頭太過故爾收身欲速檢點將來彼此弄一解險爭卻我晞齋老居士一道平懷胸無宿物巧則巧於都盧不會拙則拙至徹底難謾今朝入紫芝院裏飯僧食辦擊鼓衆集撞鐘山僧幸是尋常見慣不講聲應氣求賓主歷然試彈一曲橫按拄杖云翕如也純如也繳如也繹如也不消禮拜歸方丈相逢自有知音知若問本來人十餘年前有箇跨虎松門要騎便騎要下便下自云擔雪老漢始從天台來卻往南嶽去西澨江頭驀拶相逢蚤已勘驗過潼泉更不必與露柱添眉取笑識者仍靠拄杖休去歐陽則明居士請上堂問十方俱擊鼓十處一齊聞未審是聲來耳邊耳往聲處師云幾與闍黎道理進云三十年來曾不識直至于今始得親師打云喫棒到驢年問盡大地是沙門一隻眼因甚麼同眠各夢師云神前木虎子進云寸草不生纖塵不立是什麼田地師云小兒不著鞋進云外不放入內不放出其中還有轉身句麼師云雨下街頭溼晴乾又少泥僧一喝師便打乃卓一下云道遠乎哉觸事而真聖遠乎哉體之即神木魚口裏明珠吞卻山河大地泥像手中如意指揮日月星辰所以從觀音門入者蝦蟆蚯蚓與汝發機從文殊門入者墻壁瓦礫與汝發機從普賢門入者一亙晴虛萬象森羅與汝發機驀拈拄杖云從這裏入者將甚麼發機卓一下云悟了同未悟歸家尋舊路信女聶門丁氏法名廣德請上堂問鹿門作齋請疏回向拈梳插髻便乃出去是有所求是無所求師云別人口裏討不得進云今朝作齋底當於甚處回向師云好日多同進云沒弦琴上無生曲有語分明説向誰師打一棒云和煙搭在玉欄干問王令已行天下遍將軍塞外絶煙塵眨上眉毛是何境界師云沒鐙驢子夜三更進云不是與人難共住大都緇素要分明師云萬里崖州君自去不妨長作嶺南人問法幢高建禪苑重新學人上來乞師指示師云大洋海底鑽龜卜僧拈香云曩謨三漫哆沒馱喃師隨聲打云習氣也不除乃舉六祖慧能大師受道之後至廣州法相寺寓止廊廡間暮夜風揚剎幡二僧對論一曰風動一曰幡動往復酬答曾未契理祖乃前曰可容俗流輒預高論否二僧曰願聞其義祖曰不是風動不是幡動仁者心動師喝一喝云大小祖師元來小膽非風動非幡動怕不是心動可惜二僧是法相涅槃堂裏漢聞與麼説莽莽鹵鹵還同天鼓諸兄弟並非流俗阿師風動幡動心動為你拈卻了更向甚處見祖師弟子吳福普蕭福恆崔福海同寶參大德請上堂鬧浩浩中靜悄悄十字街頭石敢當無人起動靜悄悄中鬧浩浩月暈而風礎潤而雨芭蕉聞雷長葵花隨目轉不靜不鬧天平地成驀拈拄杖云是汝諸人鼻孔眼睛總穿在者裏臨危不悚底近前速道衆無出者師遂卓拄杖一下云萬里白雲未是遠古復鄉紳謝子麟護法偕緣吳氏法名嶽靜請上堂問答畢乃云薰風南來涼生殿角四面樓臺映月萬家煙火炊雲漁父謳歌農人荷钁芳草入謝公之句黃鶯調叔夜之琴語密難藏心真莫測雖然意不在言寧免來機亦赴喝一喝顧衆云有麼有麼兩兩三三看玉立千重百匝轉光輝
