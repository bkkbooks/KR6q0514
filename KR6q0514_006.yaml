body:
  text: 住北京翊教寺嗣法門人上睿等編詩偈周注西刺史北旋贈別般若緣深一見真暖風和日對相親此歸憑豁金剛眼去看嵩華翠色新技盡懸河義未該入門一喝笑盈腮潼泉也合遭人怪錯與周公説破來東吳延皋孝廉三絶小雨溼松花披衣巖下坐起身謝白雲不覺莓苔破豆葉開新畝藤花爛舊棚庭分朝樹色溪轉夜泉聲終朝看瀑流夜復坐空閣明月上高峰幽人不寂寞贈卞令之廉憲一會靈山法道親利生權現宰官身三千里外擎香飯正使金牛笑轉新補袞調羹信自優文情天宇至風流楚江寬闊行相訂為與空王啓壯猷贈孔月恆居士頻來問祖意雪夕與花陰寡過無他伎修名但了心意消忘覿面疑失笑披襟松下時烹茗濡毫作孝針贈孔魏公居士籃輿重至意翩翩滿口平傾不涉詮況是鴻儒能慕道方期振起兩宗傳夫子達磨元一貫多門謬解豈其然人窮返本方堪語試看昌黎問大顛贈陳曇侯鄭公常二居士調高人和寡二子信知音不有大儒口安明古佛心素行常格物卓立見垂針剩有林泉美相期一放吟辛丑除夜示諸禪徒萬峰深處結幽關道出常情用不慳松火一爐當歲盡總輸我輩得真間壬寅元日示衆曆木常年原未辦縱多好日少他求出門間向石橋步兩派清泉抱寺流客普潤菴鐙巖文吏部同公郎允信右獻過聚垂楊近冰緑千條最喜幽人冷挂瓢乞食江千容懶拙放參湖上問漁樵深山有社堪招炳今日相逢宛似陶風雨匡廬登未得好將真意論逍遙示諸行務山居家風別無絡索廚庫僧堂尋常矩矱放下笊籬提起木杓飯是米炊麵是麥作茄看花開瓠連蒂落逐日生涯大好不惡悼解菴張新愚居士沙路環菴瑣舊苔高山何夢不君來軍持帶有寒泉水忍向風前奠一杯悼張爾歲文學借語庭空影尚陪愁生細柳緑成堆也將一陌錢焚去日暮河風卷淨灰鄂州夏伏不雨寄湛智水極暑難為畫打眠江流稍引到池蓮何人不愛山中寺日午時聞樹裏泉贈一菴居士遊夏公則菴居士遊賡臣兩兄弟遊家兄弟表人龍格外金提肯過從莫謂不情還打與出林正好話千峰客嘉魚有懷檗菴法兄石床支倦水雲間楖櫪摩挲影自間一宿鳳凰峰頂夜也曾清夢到魚山萋萋古道荷長鑱風落橫江織暮帆獨上幽巖仍打坐浪花平湧濕衣衫宿普度菴逢任仙孟詞林水落江天淨山城一水連正思過別浦相識有奇緣宿望名垂遠斯文道借傳好懷言不盡且共佛燈眠與蘇菴豁菴大心分韻書懷得笻字作客多時賓似主竹爐炊茗解疏慵是非不上間名牒去住難羈了事笻落日鳴蟬增旅況平湖秋水照衰容疊來清坐知何意午飯前頭到夜鍾宿李氏書館東嶺連嘉渚書聲載草堂遠山藍潑几近水緑回觴里靜門無鑰沙寬月似霜我來勤下榻恰好值新涼客夜別友風雨留人又一宵別君燒燭度溪橋百錢買得舟人醉明日雖晴莫放橈陶溪過訪戴小宋文學同廣生兄山深春淺共驅車攻苦人真似仲舒側理舊藏宣德製花時再到倩君書再過小宋郊居淡圃疏籬菊正扶秋香掠徑好朋俱新詩半在黃梅裏收盡奇峰入畫圖許衡叔尹蘭友甸方秋試訪寓東巖賦贈乘漲輕來一夜船快移行李就林邊選官選佛名雜異觀海觀河見不遷幾處弟兄團此日間窗風雨憶當年攤書問我如何説為指秋空月正圓過訪王報菴解元草年師友夢相關鶴澤今看喜破顏曾憶截江風雨句手緘曾寄玉泉山壽王報菴南國人文合遜尊都來鶴澤訊寒暄疏經日暖花成巷愛客荷香水到門藜擁多男森樹玉霜清兩鬢健加餐長齡不借安期棗一粒真丹內久存題龍門寺壁澗道盤蜒上霜根結斷霞鼓鍾開佛地雞犬靜人家竹榻橙香雨松鐺石火茶別山秋到葉輕重落平沙柬黃安植聖淡老師竹簾茅屋一身間只為間多復閉關怪底白雲風不問仍來覆我蘚苔斑寄懷秦茂林居士光黃奇勝昔曾探植聖松門至再三最愛清溪秦處士好山遍捨作精藍壽郭些菴春日花香透水流補山晴色上眉稠七旬四海稱元老一衲深林法比丘潔淨躬行誰與等虛間心境復何求古今多少存疑史檢定精神日見優示死心道人夜行不許投明到正是出身轉位時更把吹毛揮向上空輪無迹刃無虧付睿首座楚林法偈天山法道巍寰宇奕葉芬芳祖氣鍾十載求人今得子直承大統啓綱宗坐潤慈開士郭北靜室放住間心自不群石城精舍鎖重雲一聲午磬高寒裏雪路何人駐馬聞付祚西堂慈裔法偈信知汝力能擔荷是我尋常慣用伊會向深峰深處卓抽條成蔭見施為留別禪喜非異依依楊柳采茶天又欲之吳問曉船七十二峰青正好歸期多半在來年憶匡山伊菴禪師玉門擎出滿壺冰向日開窗榻遠朋笑指鄱湖千頃月當余蓮社一枝燈與卞令之廉憲燕子磯頭正遇時箭鋒相拄句無私春江春色洵空闊大笑聲先忘所知妙轉大機超佛祖倒施密用度賢愚迦文尼父道無二全賴高高兩手扶尹蘭友嵩山甸方屏山覃谷育有郭茂行至山微雨灑高林同人枉屐尋有懷勞夢寐得聚感秋陰居僻容逃禮來稀苦索吟果然怡此道一宿可明心送友往天台先於鏡水汲新瓶木葉飛黃打眼青桐柏仙蹤華頂日歸來説與弟兄聽與孔則山居士拈來妙用憑好手授與則山意不輕向上古今無二路為人指點甚分明送友歸里侵曉來言別孤笻出翠微反愁春色好偏引故人歸共折河邊柳誰分身上衣也當尋舊隱耕破白雲肥寄五峰怡然師木落空山萬慮忘病兼風雨度重陽寶林秋色佳無恙記許霜柑欲就嘗胡內寧朱元公和前賢遊洪山詩因步其韻選勝歡吟唱和隨調高今古若同時春晴柔柳牽條緒雲淨歸鴻見羽儀歲月俱從花裏度宮商漸向遂中移會當境曠心忘處問取誰為造物師夏田寺作示宛然夏田江上寺紺殿聳雲峰靜夜濤聲落長途客夢重高林巢老鶴古岸護神龍安得年豐稔常鳴説法鍾宿洪初洲頭柳菴層林青似嶂沙路識通津淨緑搖龕影床頭月色新再過耿氏書館林下有高士重來話遠情移籬寬菊圃聽雨度書聲江外峰千朵階前月二更相期惟此道詎欲浪間名持鉢嘉渚憩張于海館中胡為不自懶六月暑行廛野巷逢人指深林借榻眠農經言可試聖學講稀傳幸遇簞瓢隱重論秋水篇寓去瑕闍黎曠菴作客江村裏茅菴且共投淡煙浮遠水秀色起平疇總似情無著非關苦見留門門齋欲赴何日定歸舟嶽菴蘇菴豁菴以德為鄰兼贈一偈緑樹垂垂覆短溪一家東住兩家西有時罷展蓮華帙彼此忘言聽鳥啼簰洲衆居士求偈蓬門問絡似山菴返照參差一水涵芳草渡頭船子泊何分兩兩與三三壬子六月再到廣賢與端公夜話賦此留別倒指十年説法曾幽懷未隔水層層青溪照影重來訪白屋炊香取次應宿鳥林深歸似舍炎宵話久冷如冰雜華書就秋隨至斫額峰尖望一登客中連雨與端公言懷張常伯皮瑤庭適至不待晴來屐輾泥知因久客句無題沙村雨鬧官過驛草樹宵涼水到堤薊北遠書孤雁帶江南佳話野僧提一瓢獨往無深意舊結蘿菴在郢西示死心道人越格堂堂悟處深自能死卻聖凡心一肩濟北家風峻竭力斯宗正在今示一念道人履道無過一念純衆中躍出見天真珠回玉轉祖師意歷歷明明用到親甲寅歲朝試作啓戶晨鍾接響圓春來松色倍悠然高峰雲擁千層磴古寺橋回兩道泉佛祖并拈紅焰雪王侯遠遜緑蘿煙因人不識唐朝塔指點梅花當拜年六日猶雪應是寒威重連朝六不收齊腰人鮮立擁澗客稀投炙火聽春沸頑吟喜病瘳深山間衲子曷羡有重裘雪夜圍爐柬孔則山取性然松每夜闌深山不見有重寒砂鍋煮爛石頭汁品字龍膏火未殘付野潛柱知藏風吹石裂與麼來按過重關了不猜真實方堪行祖道頭頭止眼為人開馬賁玉居士以笻杖見貽大宛笻何得遺來目未曛一尋剛少尺九節自生文指月晴無翳敲空響特聞好山隨徙倚還可劃秋雲付聞思綮維那病眠佛法身心何處著也能自己笑愚狂沙彌喚起無他炙一盞薑湯穩肚腸余病稍愈紹徙忽冒風熱幸得汗晨起示徹徒樹引泉聲病覺安四山春好試行看必須汝弟芒鞋健去理東巖舊藥欄寄懷抱法師半塘白水貯新月又種前灣柳一隄想對高雲晴説法自將如意指鶯啼寄懷別雲和尚唱提祖道曾無倦同自南歸住復開但與青松衡友誼關心還是水西梅漫作池上松花落人間事日非斫林遷虎臥步嶺喝雲飛世亂先還拙名浮可息機病餘間鏡影猶喜對晨暉贈恰菴居士劉是玉七十歡登選佛場心空及第好能強隨隨恰恰別無妙丈室何容置一床付則文磷書記示凝虛益先師徒人情日下思前哲法運垂秋倚大僧接待不嫌雲水廣勝他九上與三登劉濟甫孝廉以詩見訪依韻答之豁盡南來山水眼更逢蕭寺豈徒然一窗風雨聲搖夢半壁圖書影伴禪宇內今知名未老天涯獨信句重妍高冠大別長相對與子刪霞挽月鐫夢歸竟陵家驚移住惟添井竹喜成藂可蔭門老母扶將霜雪影為兒拂去水雲痕寄懷雲水居士毛子霞舊儀部地老天荒只著書延陵肝膽孰能如種松別院思招隱六月新涼動草廬自提蠟屐遍名山幕府才高舊夢刪黃鶴不飛紅樹底野情常寄翠微間寄懷素巖傅兄柴門雖設畫常開別岫飛雲入望來近日光黃峰色好武林春到亟須回贈耿二戶部公府蕉葉離披醒蝶夢榴華爛熳點苔痕東林社裏雖寥落三笑餘音聽尚存柬耿遠情文學點易先應瘳癖病解莊別自有精神感君下榻成知己延我來山作主人智泓尼日誦華嚴偈以示之華藏海底穿針孔繡出鴛鴦看有誰五十三人沒意智大家賺箇善財兒買石得雲饒不是華山山頂骨亦非鬼斧削鴻濛一錢博得千峰色喜見龍吟出袖中夜讀魯論至顏回章桐華月影疏愧讀古人書孰以回為死誰從子所居簞瓢流歲月風雨壞門廬師弟存知己斯文未喪子柬嵩杲古寺宵寒發素琴高梧露滴答空音懷人海國鴻無影作客天涯歲漸深杖策擬尋芳草徑披雲更選緑蘿陰出門幾度猶回首為爾長年共此心賦沖雲鷂眼底秋聲驚到樹好風不借翼偏牢凌虛始見孤標格在野何殊衆羽毛豈為牽群常落影肯隨輕舉尚回翱兒童那解騫飛意拍手惟論燕雀高基隆山禮無念有禪師遺像塔豎別峰影在茲楸杉秋滿碧參差苔荒古砌蟲啼冷煙鎖間龕月上遲機裏無言全殺活罵中有藥喪情癡比來此道多文藻拜起愴然長憶師題五峰寺壁我悅山中住栽成五嶺松種田秋博飯説法午鳴鐘繞屋流清澗長吟醒睡龍舉頭雲影外明月上高峰趙公遠夏言讀書紫雲山秋光寸寸寫幽奇別業深雲護作籬白日山中天地老清宵月下弟兄宜圖書代主先留客花木因人亦笑時近得好峰堪置我免從風雨起遐思懷國清曇兄能仁無兄二和尚昨書云其丹丘隱又轉剡溪走一回好鏡新機酬唱盡明春定到楚山來贈桐巖靜主三十餘年住此山渠儂意氣果能間支笻且趁月明夜種得青松耐老看喜秦公蘧文學至山天臺卓出萬山中君到山頭秋正紅為問十年得力句夜深清露滴枯桐示湛維那草菴忽卸琉璃瓦萬丈深寒徹底窮獨有梅華知此意一枝斜放短牆東示學副寺大統綱宗須識句多年古灶冷重搘家風切莫嫌疏淡想像楊岐乍住時歲朝示衆年頭佛法無多子拄杖抬頭又見春莫謂青山能放懶青山慣肯笑間人懷寶安去兄和尚錫山華里寺別忽逾三年默坐枯腸響還思第一泉示喻君華赤城深固誰能到到者應須息萬端歸去逢人直舉似從教平地起波瀾贈解菴居士林間常聽説張三無事於心只放憨今日相逢重接過深山應許結蘿菴寄懷玉泉東旭師聞將葛葉來炊釜賴得泉聲可息機歲晚寧無風雨倦山寒徒有夢魂飛雪天示諸禪者寒寒寒胡僧兩耳帶金環草鞋踏破赤腳走那許間名落世間寒寒寒古廟香爐灰冷殘大意西來覓不得推出神前酒臺盤寒寒寒萬壑千巖行路難五九盡日春自至碧眼黃頭帶笑看示楞侍者春無三日晴獨坐兩眉橫拄杖抽枝後法堂前草生悼圓鑒居士耿三兵憲秦越官尊致隱遲柩回始獲拜靈祠傷心最是雙溪水耳畔聲寒下哭時付運機璿記録山居雜詠百卉青青二月春梨華綻處只如銀雨晴隨意經行入萬樹寒香擁一身不嫌眼冷眉撑月且放籬荒水過林新竹才成低戶影曉雲慣作覆巖陰一日天晴兩日雨藤華未摘已春闌枝頭小鳥聲如渴報我西溪欲放完芳草離離覆石根無端終日雨煙屯時人那解飛龍處輕作尋常野水論翠壁如屏啓戶前落華曉砌石幢邊鉢盂有口平吞盡折腳鐺中栗棘圓天涯身寄緑蘿菴雨過群峰似潑藍幾點客雲歸遠岫杜鵑聲裏憶江南閣筆聊成他日史灰心猶憶去年梅鶴鳴階下吟初穩華壓枝梢夢正回深林無暑倍精神石上披雲憶古人長嘯一聲天地裂不知何處著渾身荷華開盡紫荊開無事間行上古臺日暮路長騎馬走利名誰放入出來南山雲起北山頭王老東村笑不休白豆華開天又雨今年秋勝去年秋扇子芭蕉自剪為幽居是事獲便宜秋心不在梧桐上葉落空庭曉未知石田數畝刈方休不上高峰即負秋紅葉幾家村影亂穿來一串杖頭收幸有殘霞箋寄遠堪從鴈語識行藏一時道大名還老高枕山隈水更香雙桂香飄幾葉孫撩天鼻孔漫尋真皮膚脫盡無多子始信渠儂意氣新霜作鬚眉紙作衣德涼已較古人非幾回坐落山尖月不覺疏煙濕翠微苔徑斜暉侵錫影石床華雨放間身敲空作響翻成拙道在何方此日貧都知傀儡倒棚休宇宙勞勞事更悠洞口縱無黃葉出靈源端在古溪頭三更還自煮雲芽挂壁青燈照影斜手接南星忘把盞為伊一伴惜年華地爐煙穩火猶紅壞衲情深肯伴窮幾處寒聲驚落木故人千里自同風老屋三椽僅蓋頭春泉脈脈繞床流白雲不放青山懶出入松門意未休橫鉤新月較眉粗曾照華亭江上夫夜靜綸斜霜墜餌竿頭躍出化龍魚鬧市城中熱萬端數來相對眼同寒問余祖意秋江上一曲漁歌過遠灘自棹輕舟自掃除清晨迓我過松廬一湖秋水當門碧大富還他長者居莫待身間事始休乾坤終不置間郵直須剔起眉毛看大地山河一指頭莫謂吾宗法社寒東西各住好峰巒間行指點松千樹特過平分月一團大清康熙二十五年歲次丙寅中秋月小師上睿率衆弟子發心敬刻先老和尚語録一部版存杭州嘉興府楞嚴寺隨藏永遠流通惟冀衆等早明般若正因速證菩提妙果復願見聞隨喜咸悟真乘法界有情同登彼岸
