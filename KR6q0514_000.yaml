front:
  text: 俞昭禪師語録目録卷首序文目録一卷住江西廬山西林乾明寺語録二卷住郢州潼泉山法興禪寺語録三卷住武昌東巖廣慧禪寺語録住竟陵紫芝菴語録四卷住鄂渚洪山寶通報國禪寺語録五卷住齊安天臺赤城禪寺語録示衆機緣頌古塔銘重修洪山寺疏佛事六卷雜偈目録終嘯堂和尚語録敘嘯堂汾和尚挾復子上靈巖時豫在侍寮典記見其敝衣楚音翛然自得絶無近世禪殼子陋習退翁先師心賞之俾居不租寮朝夕勤懇不自廢椎拂之下有所證入然性謙抑祕其芒耀不喜以所長病人故人亦莫知其所得也未幾典藏鑰升掌書記會同門古嶷和尚唱滅於匡廬之乾明山中緇白咸謂丈室不可久虛專使齎牘至吳門請先師遴主法者以慰群望先師集群弟子於廣堂瞬顧一匝語和尚曰汾汝堪此任和尚亦欣然請行自攜瓶鉢長揖故山惟知師命尊嚴不計衆緣缺乏一衆錯愕始悟其久蒙記莂特時至而理彰耳豫嘗有詩送之曰下板沉埋苦自持囊錐穎露衆方知但令猛虎馱行橐當有神龍獻住基隨事不妨加損益乘時何必問艱危此回只作看山想竹杖芒鞋任所之領院三閲月知事有梗化者和尚拂衣徑行或者進曰盍少貶以順機宜無致山林岑寂和尚笑曰莊生嘗謂觀德人之容令人意消今劈腹剜心朝夕與之提訓不能少變其習染自愧德涼未敢學蚖蛇之戀窟宅也識者聞而韙之自是聲望愈高列剎爭致如黃安之赤城竟陵之芝紫京山之桐泉武昌之東巖最後應楚撫大中丞張公之請中興洪山寶通禪寺和尚不出戶庭莊嚴畢備顧瞻歎嗟以為神運前後皆有上堂示衆等語門人住京都翊教楚林睿公編次共若干卷將壽諸梓以廣流布不遠數千里走山中乞一言辨其首豫嘉其志而敘夙昔之同在師門一段以表終始翛然自得事皆緣會而興非若屈己從人喪其固有卒被聲利所束縛而為智人之所深愍者可同日語也昔人有言曰沙門華言離欲離欲則方寸自虛而萬景畢入入必有所展泄垂慈應物發為心聲此教之所由興道之所由立也譬如洪鐘在虡有扣則鳴細梴巨杵判然自別而鐘則初無限約於其間惟赴來機而成其應耳詎非古人虛靈寂妙之旨併所謂識取無依佛亦無得者乎挽近説法必主摹仿否則以為杜撰而共非之墨數行循一摸脫出雖充棟汗生真如像龍不能行雨雖多亦已奚為讀斯録者蓋可少悟其翛然自得之旨矣時康熙丙寅秋日前住靈巖同門法弟曉青題於華山之臥雲深處
