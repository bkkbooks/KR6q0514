body:
  text: 住北京翊教寺嗣法門人上睿等編示衆赤城這裏峰巒峻異鳥道虛玄虎嘯幽巖猿吟古木白雲為蓋流泉作琴風回清曉之松露滴中宵之月見無見色聞無聞聲一味蕭然何可趣向是汝諸人江東西湖南北大屋寬堂稱朗皮草慣了更恁千里萬里跛跛挈挈來此圖箇甚麼喝一喝下座示衆舉無著往臺山禮文殊殊問大德從何方而來著云南方殊云南方佛法如何住持著云末法比丘少奉戒律殊云多少衆著云或三百或五百無著卻問和尚此間佛法如何住持殊云凡聖同居龍蛇混雜著云多少衆殊云前三三後三三師云大小文殊自家山裏人也分疏不落直恁訛言亂衆驀顧衆云此間莫有從南來者麼試與文殊作主示衆舉白雲端和尚上堂云古人留下一言半句未透時撞著鐵壁相似忽然一日覷透方知自己便是鐵壁且道如今作麼生透乃云鐵壁鐵壁師云鐵壁鐵壁自己不識轉得身來未有棒喫驀拈拄杖卓一下云一言半句我也弗惜示衆舉僧問風穴如何是清淨法身穴云金沙灘頭馬郎婦師云揚帆出帝都草木盡扶蘇春色無高下誰人入畫圖示衆舉仰山一日指雪獅子云還有過此色者麼雲門云當時但與推倒雪竇云雲門只解推倒不能扶起師云大家弄箇雪獅子彼此機關無可比登山到頂不知休入海更須窮到底示衆舉雲門上堂云釋迦老子與天帝釋在中庭裏相爭佛法甚鬧師云三千條罪國有憲章釋迦老子何故與天帝釋在中庭裏相爭雲門大師雖然詣實指陳爭奈人天衆前未肯斷他勝負赤城今日法堂上將這一段公案對衆為伊結絶驀提拄杖云七十二棒且輕恕一百五十難放伊擲下拄杖示衆今朝五月十五平地三尺洪雨拄杖忽化為龍一口吞盡佛祖有不惜性命底與我活捉將來敲骨取髓管你無咎乃攛下拄杖一衆定動師云柴也愚參也魯見義不為何勇之有示衆舉僧問仰山法身還解説法也無山云我説不得別有一人説得僧云説得底人在甚麼處仰山推出枕子溈山聞云寂子用劍刃上事師云昨夜三腳驢踏破虛空背萬象盡喫驚露柱猶瞌睡喝一喝示衆諸方三百五百説禪浩浩地言多去道轉遠爭如我這裏栽田博飯喫昨日雨今朝晴東溪牽犁釋迦不先西溪拽耙彌勒不後水牯牛瞌睡也未曾打箇擔版漢豈有間工夫門前交腳坐現成公案放你三十棒驀拈拄杖擲下云分付與直歲示衆世問諸法如幻生死猶若雷電法身白在圓通出入山河無間師云勘破了也或云勘破後如何但向道志公不是間和尚示衆舉蓮華峰祥菴主拈拄杖示衆云古人到這裏為甚麼不肯住衆無語自代云為他途路不得力復云畢竟如何又自代云楖櫪橫肩不顧人直入千峰萬峰去師云我本山中人愛説山中話五月賣松風人間恐無價示衆舉雲門道若説菩提涅槃真如解脫是燒楓香供養你若説佛説祖是燒黃熟香供養你若説超佛越祖之談是燒餅香供養你皈依佛法僧下去師云雲門老漢口似鼻孔示衆舉道吾和尚云高不在絶頂富不在福嚴樂不在天堂苦不在地獄相識滿天下知心能幾人大慧和尚云高在絶頂富在福嚴樂在天堂苦在地獄誰知席帽下元是昔愁人師云二大老一人放憨一人亂走赤城若也撞見朝打三千暮打八百示衆深山藏獨虎淺草露群蛇不許夜行投明須到你諸人三十年破草鞋穿一雙提一隻亂踏向前暫時岐路便千里萬里近日世界不好賊是小人智過君子打破大散關幾箇迷逢達磨示衆舉臨濟一日同普化赴施主齋次濟問毛吞巨海芥納須彌為復是神通妙用為復是法爾如然化躍倒飯床濟云太粗生化云這裏是甚麼所在説粗説細來日又同赴齋濟復問今日供養何似昨日化又躍倒飯床濟云得即得太粗生化喝云瞎漢佛法説什麼粗細濟乃吐舌師云兩箇無慚愧漢食到口邊祗宜隨分卻乃鼓粥飯氣以較精粗已是不著便是汝諸人更作佛法商量彼彼有何利益示衆雲山聚會意為平生十箇五箇兩道行纏走上走下被他諸方甜唇美齒説作配當旦旦而鳴宵宵而語這邊那邊玄會妙會徹與不徹到兼未到幾曾踏著正脈赤城不惜好手為諸兄弟一舉豎起拳云這箇因甚喚作拳頭衆擬對師云槌折你腰示衆舉趙州和尚至桐城縣投子出山途中相遇乃逆而問云莫是投子山主麼子云茶鹽錢布施將來州先歸菴中坐子後攜一瓶油歸州云久嚮投子到來只見箇賣油翁子云汝祗識賣油翁且不識投子州云如何是投子子提起油瓶云油油師云莫怪相逢不相識隱隱猶懷舊日嫌示衆三世諸佛骨髓敲磕將來有漏笊籬無漏木杓六代祖師眼睛突出難辨今日也恁麼明日也恁麼列在三條椽下有什了期狗脊坡頭老鴉線斷行到水窮處坐看雲起時尚有人不放伊過鬧市裏一箇兩箇君往西秦我之東魯示衆古路少人行孤峰無宿客後會罕逢南嶽讓和尚嵩山安國師往來不易在天天中尊在人人中尊但莫憎愛洞然明白衲僧到此便道不妨我東行西行忽然暗地裏撞著露柱傍人直喚你作瞎漢你心還甘也未示衆至孝是重華老僧有過闍黎須知坐則共你坐立則共你立為甚麼平地喫交都扶不起一僧進前云和尚年尊某甲無氣力師打一棒云不可教老僧自倒自起也示衆舉南泉上堂云王老師賣身去也還有人買麼一僧出云某甲買泉云不作貴不作賤汝作麼生買僧無語臥龍代云和尚屬某甲去也禾山云是何道理趙州云明年與和尚作領布衫雪竇云別處容和尚不得師云日中則市爭之不足退一步看南泉未免叫悔何故不見道從來滯貨沒人爭示衆舉龍濟云是柱不見柱非柱不見柱是非已去了是非裏薦取師云才得南收又北征長安道上未停兵從前汗馬功無惜只要重題蓋代名示衆舉大愚上堂云大家相聚喫莖虀若喚作一莖虀入地獄如箭射師拈拄杖顧衆云我不敢輕於汝等衆擬思師一時趁下示衆舉雪峰一日普請自負一束藤路逢一僧峰便拋下僧方擬取峰便踏倒歸舉似長生乃云我今日踏者僧快生云和尚替者僧入涅槃堂始得峰便休去師云者僧若不是鐵作脊骨幾乎兩段不同長生擬扶這僧怎奈陷人以死赤城飯後普請東山西嶺青一一束縛歸來置之間處敢有一人動著藤條未到折在示衆舉楊岐老祖上堂云楊岐乍住屋壁疏師云七穿八穴滿床盡布雪真珠師云少賣弄縮卻項師云笑多哂少暗嗟吁師云只道得一半翻憶古人樹下居師云又恁麼去也示衆佛法無多般今朝甚好雪林下何曾見一人千溪萬派舌頭結納子自難謾老胡猶隔絶赤城爐焰中不用茱萸橛掉向牆南寧免眼熱示衆舉興化謂克賓維那云汝不久為唱導之師賓云不入這保社化云會了不入不會了不入賓云總不與麼化便打云克賓維那法戰不勝罰錢五貫設饡飯一堂次日化自白椎云克賓維那法戰不勝不得喫飯即便出院師云出院罰錢作者知失便宜處得便宜如今四海波濤靜塞北江南不著伊示衆潼泉一路瀑水千尋放卻擔簦截流相見乾坤把定不把定日月放行不放行一種平懷客是主人相師若祗愛佛念法有少希求三回兩度轉見不堪雖叨香積之餐難下陳蕃之榻示衆少室峰高洛陽城古天台僅有南嶽絶無明月照見夜行人草鞋祗栽三箇耳大丈夫漢即今休去便休去欲覓了時無了時喝一喝云相隨來也潼泉與你一碗茶喫示衆不知日月之大小不知時分之延促這漢本是山中人不省人間事灰頭土面聽與麼過諸德到處經冬度夏一口針三尺線長年在手裏衲衣下事究竟如何脫體道將來許你裁長補短機緣師豎起竹篦問僧曰喚作竹篦則觸不喚作竹篦則背不得有語不得無語速道速道僧云開口見膽師張口云山僧開口也你見底膽聻僧無語師便打師問僧大死底人卻活時如何僧云總瞞他不得師云眼在甚麼處僧擬議師驀面一掌云何不道與鼻孔為鄰衆參師云道得也三十棒道不得也三十棒一僧云心不負人面無慚色一僧云龍得水時添意氣虎逢山勢長威獰一僧云正是時一僧云火裏蝍蟟吞大蟲師云德山令行並須瓦解師垂問攪長河為酥酪變大地作黃金未是好手飯是米做一句作麼生道一僧云金牛不是好心師云過在甚麼處僧無語師云少問聞版聲不得赴堂飯頭從傍云蒼天蒼天師云你自手作底何得叫冤叫屈頭亦無語師云勞而無功師垂問恁麼也不得不恁麼也不得恁麼不恁麼總不得自己胸中流出一句來一僧云展一僧云切師云前者落節後者拔本復一僧出擬進語師即以手掩其口云路不拾遺師出山適雨下問衆云天晴不肯出直待雨淋頭即今雨下也不涉泥水道將一句來一僧云和尚前行某甲後隨師便起身拈拄杖僧罔措師打云將謂我蓋覆得你師喚僧僧應諾師云此去漢陽不遠師問僧不思善不思惡正恁麼時那箇是你本來面目僧云風從華裏過來香師云隔僧擺手云灑灑落落去也師云他時方信路行難僧參師便喝僧亦喝師又喝僧無語師云已後不得學老僧師問一居士不是心不是佛不是物是甚麼士云和盤托出大家看師便打士擬議師又打士作禮云學人到者裏卻沒奈何師云盞子撲落地碟子成七片師問僧如何是你父母未生前本來面目僧一喝師云能老能大當門無齒僧又喝師打云果不關風師問僧萬法如何歸一僧云學人自來不曾離和尚師云畢竟一歸何處僧無語師云全靠山僧不得師問僧如何是諸佛出身處僧云僧堂前佛殿後師云如何是你出身處僧云露柱燈籠師云好箇師僧被露柱燈籠吞卻僧云和尚莫錯會師打一棒云你更錯會師下堂一居士出師搊拄云道道士云不道師云不用不道士云牆壁有耳師拓開云將謂你是箇俗漢士云平地起波瀾師云到山僧袈裟角下也未士擬議師便打僧問有佛處不得住無佛處急走過學人到這裏為什麼去不得師云春無三日晴僧云大似水長船高師劈面一掌云消得龍王多少風師下堂問一居士不思善不思惡正恁麼時那箇是你本來面目士云半夜日頭紅師云見怪不怪其怪自壞師下堂僧出師搊住問大死底人卻活時如何僧云賊是小人智過君子師云因甚不許夜行投明須到僧云金色頭陀解破顏師云未在更道僧云正是某甲放身命處師云鉤在不擬之地頌古汾陽昭禪師上堂謂衆云夫説法者須具十智同真若不具十智同真邪正不辨緇素不分不能與人天為眼目決斷是非如鳥飛空而折翼如箭射的而斷弦弦斷故射的不中翼折故空不可飛弦壯翼牢空的俱徹作麼生是十智同真與諸上座點出一同一質二同大事三總同參四同真智五同遍普六同具足七同得失八同生殺九同音吼十同得入又云與甚麼人同得入與阿誰同音吼作麼生是同生殺甚麼物同得失阿那箇同具足是甚麼同遍普何人同真智孰能總同參那箇同大事何物同一質有點得出底麼點得出者不吝慈悲點不出來未有參學眼在切須辨取要識是非面目現在不可久立珍重廚庫三門同一質露柱開口笑燈籠春光不耐床頭撿曉起臨窗抹日紅大事難將瑣細陳謝家郎不在漁津白雲日抱青山走眼裏無筋一世貧放過前三與後三雲山海月總同參雖然不展吹毛利六月嚴霜滿口含真智無生擬即差紅爐焰上雪飛花鬼家活計焦頭額大用臨機辨作家東山西嶺同遍普須彌槌打虛空鼓火燒松樹勢如龍奇怪石頭形似虎珍異無驚同具足拈來瓦礫盡黃金當門莫插垂絲柳恐惹千條萬緒心即當生緣同得失帆回九面看衡湘怪來一夜西風惡擲去蘆花淺水旁生殺權衡得自繇霜花飛滿一天秋月明江上人無影濯濯寒光射斗牛犬吠驢鳴六不收同音吼處沒來由年來雙耳龍鍾甚聽事無心聽水流黑漆屏風石磊磊松蘿亮槅玉珊珊東西南北門相對同得入時兩被瞞汾陽老汾陽老西河説法天寒蚤果然面目得人憎濟上綱宗盡底倒總嘯堂和尚塔銘併序師名允汾字俞昭嘯堂其別號也出竟陵吳氏父嵒邑諸生母許早寡長齋奉佛日課蓮經師每侍側拱而聽有所感發誓為僧以酬高厚母首肯之族人皆以為不可強之娶至年二十喪偶獲遂初志投郢州蓮臺寺玄萃法師剃染尋詣沱潛法雲社從三昧律師受具遭世喪亂隱荊南之玉泉山學經論三年一日閲法華至火宅喻有大白牛肥壯多力行步平正其疾如風疑甚就一老宿質之是何物而行步平正其疾如風耶老宿叱之曰下坡不走快便難逢師茫然莫識其旨老宿復顧謂曰博通三藏尚落筌蹄聖心未通難脫生死汝器識沉邃天資粹美南方禪宗大盛何惜一緉草鞋了茲大事乎師念老宿語非徒然遂發意南詢過里門值母疾革留侍湯藥畢後事乃腰包而行至漢口值圓鑒居士耿玉齊適有兵備台海之命片言投契邀與同舟抵武林首參靈隱禮和尚問以佛法大意禮握竹篦便打師不薦因渡錢塘將別參時庚寅春也適退翁先師赴台州天寧之請遇於旅次師具威儀入見翁問曰大德擬何往師曰天童雪竇翁曰將何所求師曰求了生死翁曰即今山河大地明暗色空法法現前各不相借作麼生説箇了底道理又喚甚麼作生死試語我師乃再拜求指示翁曰途路中無暇為汝説得且隨我去天台許多山水也不惡師自是得與籌室每有咨問翁即憑陵曰我這裏無一字挂他齒頰苦要向人口裏討甚麼漆桶速退曾不少假辭色師以己事未明復遭詬罵殊憤憤不樂辛卯元日會同參八九輩起精進七師亦與焉午後值翁下堂師近前作禮翁便打師擬伸問翁又打曰汝擬作佛法會耶師於言下灑然領旨遂拈古詩作投機頌曰朝辭白帝彩雲間千里江陵一日還兩岸猿聲啼不住扁舟已過萬重山翁笑曰我助汝喜子今得達故鄉也一日翁上堂師出問曰昨日有人從淮揚來報道懷州牛喫禾益州馬腹脹直得世醫拱手敢請別選官方翁曰事久多變師於地上拈一莖草曰祗這箇黃檗可為鄰翁曰草本不勞拈出師曰黃連未是苦翁打曰辛辣底且隨分用些師顧衆曰若不是這老漢怎下得這副手腳從此機鋒穎脫號稱嚙鏃歲丁酉廬山乾明虛席翁命師往師欣然而行瓶盂杖履猶夫在衆日也山中耆舊翕然稱之未幾轉黃安之赤城天臺嘉魚之夏田廣賢又轉京山之潼泉景陵之紫芝卞孝旨居士同今江南廉憲令之創東巖精舍延師為第一世時退翁先師有浮湘之行過鄂渚衆請説法於此遂額其堂曰同真以表師資道協楚撫大中丞張公朝珍籓伯徐公惺欽師道範專使齎書至潼泉往復者三必欲得師中興洪山寶通禪寺將併甲乙為十方院中丞殫心區畫堂搆維新寺所宜有無不畢備武昌乃楚之都會地當衝要時朝庭方問罪湖南兵馬絡繹惟師宴然無營虛懷等視上至節越方鎮下至輿臺隸卒見師慈氣薰人愛語導物無不投戈膜拜而去至庚申正月五日示微疾乃謂左右曰老僧知得汝輩不知乘小肩輿遍辭檀護二月八日為先師生忌燒香設饌併上歷代祖供訖遂移居東巖別室據座索筆書一偈曰世間憎愛關芳菲底事何曾善赴機要識洪山真旨趣臨行但聽雪花飛至十三日泊然長逝門外果雪深三尺遠近駭異謂師真不測人乘願再來橋船末世者也師世壽五十有九僧臘三十有八門人上睿理祚等奉師全身塔於京山潼泉之東南隅以豫與師同門中交契最深睿公不遠三千餘里來乞塔上之銘豫謹按其歲月編次其行事序而銘之銘曰師誕於楚祥鍾延陵母氏聖善俾從大僧慧刀裂綱玉泉扃戶習學貫花荊門獨步露地白牛如風旋轉心忽生疑是稱勇敢老宿者誰弗彰名字特為指南其志以肆靈隱發機靈巖脫韝臨濟來源特明授受出領乾明匡盧雲曉法鼓一撾佛日杲杲江漢風高湖湘化溥歸根無口萬物皆我洪山再開勛居元席師示大公人難企及雪花飛彩冰焰騰輝藏身無迹用告真歸落落團團黃金充國潭北湘南千秋永式時康熙歲次丙寅秋月前住三峰靈巖同門法弟華山曉青謹撰重修洪山寺疏鄂渚形勝湘澤通都峰壑瀠洄古剎環錯東接方域十里洪山飛翠靄西臨漢水千層寶塔放光明在昔紫殿浮煙青臒與丹霞競采於今斷垣叢莽野鴿共飢烏亂啼遂使歷世壯觀永歎緇塵浩劫緑禾遍隴頭大中丞爰命勸農之駕青楓盈道左群屬吏趣承問俗之蹤撫景動心感通冥契憶漢宮宵夢曾對丈六金身追梁代芳規適符四八弘誓始知真佛子定屬大宰官念茲講堂風微梵王徘徊而不下何當剎竿日暖釋帝躑躅以言歸余負質鈍蒙勞形塵鞅頽煙寒雨空賦曩哲招提之詩畫棟朱甍敬遵大人布金之願欲開大乘福地端藉禪宿耆賢夙聞武昌洪山左側東巖俞昭和尚承源鷲嶺振錫精藍白石清泉久已鑿山開道法幢方丈時欽杖策登峰緬懷夏口崇巒慧居回新法界瞻言渚宮荒阜樂土詎少同心邀龍象以經行披榛闢草盻珠幡而至止準古開今翹首策紺馬於閻浮廣締三生勝果延佇轉金輪於忍土蚤成六度良因從此玉節輝煌偕衆生同登仁域將見金城雄峙普慈航俱仰宗風矣時康熙丁巳菊月既望楚北承宣使者徐盥沭敬書佛事為湛首座封龕鐵骨撑撑生平自許力在祖庭千古萬古末後一著全提更見胸懷超舉掩龕云可道身心不動入於無量義處起龕二月二十九日以前你欲離此位裏其奈車不橫推爭敢起動二月二十九日以後你欲住此位裏須知理無曲斷甚處安排正當二月二十九日東西南北上下四維淨裸裸赤灑灑沒可把自有通方一路遂以拄杖擊龕云徐行踏斷流水聲縱觀寫出飛禽迹舉火昨日猶風雨今朝最吉祥高雲開遠岫鳥語送晴香把火炬云首座人天眼目合宜如是威光攛火炬云清機歷歷烈焰煌煌玄微銷爍盡文彩見全彰入塔穩密田地佳秀林巒一錐獨露白雲堆千嶂奇攢青宰堵基成劫外樣越今時到底到尖渾沒絲縫摩空摩日愈見孤高棒起骨石云湛首座猶有者箇在山僧常懷論實不惜腕頭之力定然放得你著送入塔中喝一喝云水繞山長層落落龍回虎顧影團團為悟心闍黎舉火般若大火聚本光瑞如此悟公我戒兄雪腸直數你臘高祗樹法護鵝珠吳水層層慣汲銅瓶秋漱月越山疊疊恆持寶杖夜鳴霜崇報堂中曾經當機領話赤城句下便肯豎點其頭棲舊隱於荷湖潔孤行於塵表後半生履未出戶二六時心無異緣滿口白蓮飛香通身雜華自禮允矣須菩提之標格卓哉優波離之儀型兒孫看有克家教化正宜勿倦驀地剋日以歸根四衆驚聞而淚雨真人十八界元空百骸一靈何所倚以火炬畫此相旋拂之喝一喝云潼泉直與麼來不為旁觀助哀要使輝騰烈焰攛下火炬云齊看焰發寒灰為性聞菴主起棺喝一喝云性聞老大德爾生年八十經案霜清茶鐺月皎居菴不出與世無縈谷易陵遷等是惟心淨土寒來暑往尋常只念觀音終養既有兒孫轉身好箇時節萬機寢削六用全收者裏何欲何依那邊自由自在靈床高廣實相杳矣難窺華柩莊嚴幻骸恰可安置一塵入正受諸塵三昧起無妨舉動愈見光輝以拄杖擊棺三下云舁葬無陰陽地上從教水緑與青山為檀質上座火性空真火性火真空三百六十骨節節節通上嶮峻八萬四千毛竅竅竅徹下孤危檀質上座是你有如是威光點著便照天照地若肯自信我助汝喜便攛下火炬為非二關主封龕天上無彌勒地下無彌勒且道彌勒在甚麼處掩龕云莫使外人知起龕藏身處沒蹤迹漁父棲巢沒蹤迹處莫藏身巡人犯夜直饒黃金為世界白銀為壁落也未是透關人居處拊龕三下云十方薄伽梵一路涅槃門且從春色滿園便請丹霄獨步舉火昨日雨今日晴灼然灼然弄假像真攛火炬云萬里神光頂後相一槭百雜碎看伊四大五蘊何處有也
